# Advanced Training Configuration
# Cấu hình training nâng cao để đạt độ chính xác cao nhất

model:
  name: "vinai/phobert-base"
  task_type: "classification"
  num_labels: 3
  max_length: 512  # Match training max_length
  dropout: 0.1
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1

training:
  # Basic settings
  num_epochs: 25
  batch_size: 16
  gradient_accumulation_steps: 2  # Effective batch size = 32
  max_length: 512
  seed: 42
  
  # Optimizer
  learning_rate: 2e-5
  weight_decay: 0.01
  adam_epsilon: 1e-8
  adam_betas: [0.9, 0.999]
  max_grad_norm: 1.0
  
  # Learning rate schedule
  warmup_ratio: 0.1  # 10% of total steps
  lr_scheduler_type: "cosine"  # cosine | linear | polynomial
  layerwise_lr_decay: 0.95  # Layer-wise learning rate decay
  
  # Loss function
  loss_type: "label_smoothing"  # ce | focal | label_smoothing
  label_smoothing_factor: 0.1
  focal_loss_alpha: 0.25
  focal_loss_gamma: 2.0
  
  # Advanced techniques
  use_mixup: false
  mixup_alpha: 0.2
  use_rdrop: false
  rdrop_alpha: 1.0
  use_swa: true
  swa_start_epoch: 15
  swa_lr: 0.05
  use_ema: true
  ema_decay: 0.999
  use_multi_sample_dropout: false
  num_dropout_samples: 5
  
  # Regularization
  dropout: 0.3
  attention_dropout: 0.1
  weight_decay: 0.01
  
  # Training optimization
  fp16: true  # Mixed precision training
  fp16_opt_level: "O1"
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  
  #Checkpointing
  save_steps: 100
  save_total_limit: 3
  load_best_model_at_end: false  # Disabled when evaluation=no
  metric_for_best_model: "f1"
  greater_is_better: true
  
  # Evaluation
  eval_steps: 100
  evaluation_strategy: "no"  # Disabled temporarily to avoid logits issue
  
  # Early stopping
  early_stopping: true
  early_stopping_patience: 5
  early_stopping_threshold: 0.001
  
  # Logging
  logging_steps: 50
  logging_first_step: true
  report_to: ["tensorboard"]  # tensorboard | wandb | none
  
  # Output
  output_dir: "outputs/advanced_training"
  log_dir: "logs/advanced_training"

# Logging configuration
logging:
  log_file: "logs/training.log"
  log_level: "INFO"

data:
  # Data files
  train_file: "data/processed/classification/train.json"
  val_file: "data/processed/classification/val.json"
  test_file: "data/processed/classification/test.json"
  max_length: 512  # Added for compatibility
  
  # Data augmentation
  use_augmentation: true
  augmentation_methods: ["synonym", "swap"]
  num_aug_per_sample: 2
  augmentation_prob: 0.5
  
  # Data validation
  validate_data: true
  auto_fix_issues: true
  remove_duplicates: true
  balance_classes: false
  
  # Data preprocessing
  max_length: 512
  padding: "max_length"
  truncation: true
  
  # Data splits (if not using separate files)
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

# Cross-validation (optional)
cross_validation:
  enabled: false
  n_folds: 5
  stratified: true
  shuffle: true

# Ensemble (optional)
ensemble:
  enabled: false
  num_models: 5
  aggregation: "voting"  # voting | average

# Hardware
device: "cuda"  # cuda | cpu
n_gpu: 1
distributed: false

# Reproducibility
deterministic: true
benchmark: false

# Monitoring
wandb:
  enabled: false
  project: "contract-classification"
  entity: null
  name: "advanced-training"
  tags: ["phobert", "vietnamese", "contracts"]

tensorboard:
  enabled: true
  log_dir: "logs/tensorboard"
