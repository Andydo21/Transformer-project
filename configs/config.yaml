# PhoBERT Configuration for Legal Contract Processing
# Cấu hình cho xử lý văn bản hợp đồng pháp lý tiếng Việt

# Model Configuration
model:
  name: "vinai/phobert-base"  # PhoBERT pretrained model
  task_type: "classification"  # classification, qa, ner
  num_labels: 3  # Số lượng nhãn phân loại (ví dụ: hợp đồng mua bán, thuê, dịch vụ)
  max_length: 512  # Độ dài tối đa của sequence
  dropout: 0.1
  hidden_size: 768
  num_attention_heads: 12
  num_hidden_layers: 12

# Training Arguments
training:
  output_dir: "./outputs"
  num_train_epochs: 5
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  max_grad_norm: 1.0
  
  # Logging
  logging_dir: "./logs"
  logging_steps: 50
  
  # Checkpoint
  save_steps: 500
  save_total_limit: 3
  
  # Evaluation
  eval_steps: 500
  evaluation_strategy: "steps"
  load_best_model_at_end: true
  metric_for_best_model: "f1"
  greater_is_better: true
  
  # Optimization
  gradient_accumulation_steps: 2
  fp16: false  # Set to true if using GPU with fp16 support
  dataloader_num_workers: 2

# Data Configuration
data:
  train_file: "data/processed/train.json"
  val_file: "data/processed/val.json"
  test_file: "data/processed/test.json"
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  
  # Data preprocessing
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  random_seed: 42

# Tokenizer Configuration
tokenizer:
  name: "vinai/phobert-base"
  use_fast: true
  do_lower_case: false
  add_prefix_space: false
  max_length: 512

# Loss Configuration
loss:
  type: "cross_entropy"  # cross_entropy, focal, label_smoothing
  # Focal loss params (if type = focal)
  focal_alpha: 0.25
  focal_gamma: 2.0
  # Label smoothing (if type = label_smoothing)
  smoothing: 0.1

# Inference Configuration
inference:
  batch_size: 16
  device: "cuda"  # cuda or cpu
  checkpoint_path: "./outputs/best_model"
  max_length: 512
  
  # Post-processing
  apply_softmax: true
  threshold: 0.5

# Metrics Configuration
metrics:
  compute_metrics: ["accuracy", "precision", "recall", "f1"]
  average: "weighted"  # micro, macro, weighted

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  log_file: "logs/training.log"

# Contract Specific Settings
contract:
  # Các loại hợp đồng
  contract_types:
    - "Hợp đồng mua bán"
    - "Hợp đồng thuê"
    - "Hợp đồng dịch vụ"
  
  # Các trường thông tin quan trọng
  key_fields:
    - "Bên A"
    - "Bên B"
    - "Giá trị hợp đồng"
    - "Thời hạn"
    - "Điều kiện thanh toán"
