# NER Config - Named Entity Recognition (LAW, ARTICLE)
model:
  name: "vinai/phobert-base"
  task_type: "ner"
  num_labels: 5  # O, B-LAW, I-LAW, B-ARTICLE, I-ARTICLE
  max_length: 512
  dropout: 0.1

training:
  num_epochs: 10
  batch_size: 16
  gradient_accumulation_steps: 2
  learning_rate: 3e-5  # NER thường cần lr cao hơn
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  fp16: true
  
  # Checkpointing
  save_steps: 50
  save_total_limit: 2
  load_best_model_at_end: false
  
  # Evaluation  
  eval_steps: 50
  evaluation_strategy: "no"
  
  # Logging
  logging_steps: 20
  output_dir: "outputs/ner"
  logging_dir: "logs/ner"

data:
  train_file: "data/processed/ner/train.json"
  val_file: "data/processed/ner/val.json"
  test_file: "data/processed/ner/test.json"
  max_length: 512
