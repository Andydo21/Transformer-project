# QA Config - Question Answering (Extractive)
model:
  name: "vinai/phobert-base"
  task_type: "qa"
  num_labels: 2  # Start/End positions
  max_length: 512
  dropout: 0.1

training:
  num_epochs: 10
  batch_size: 8  # QA cần nhiều memory hơn
  gradient_accumulation_steps: 4  # Effective: 32
  learning_rate: 3e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  fp16: true
  
  # Checkpointing
  save_steps: 50
  save_total_limit: 2
  load_best_model_at_end: false
  
  # Evaluation
  eval_steps: 50
  evaluation_strategy: "no"
  
  # Logging
  logging_steps: 20
  output_dir: "outputs/qa"
  logging_dir: "logs/qa"

data:
  train_file: "data/processed/qa/train.json"
  val_file: "data/processed/qa/val.json"
  test_file: "data/processed/qa/test.json"
  max_length: 512
  doc_stride: 128  # For long documents
